<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3DPixelZodiac Preview</title>
  <style>
    body { margin: 0; font-family: Consolas, monospace; background: #1f1f1f; color: #fff; }
    .wrap { padding: 24px; display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .card { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px; padding: 10px; }
    img { width: 100%; height: auto; image-rendering: pixelated; background: repeating-conic-gradient(#555 0% 25%, #444 0% 50%) 50%/20px 20px; }
    .name { margin-top: 6px; text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card"><img src="dist/zodiac-ox.svg" alt="ox" /><div class="name">ox</div></div>
    <div class="card"><img src="dist/zodiac-tiger.svg" alt="tiger" /><div class="name">tiger</div></div>
    <div class="card"><img src="dist/zodiac.svg" alt="default" /><div class="name">default</div></div>
  </div>
</body>
</html>
